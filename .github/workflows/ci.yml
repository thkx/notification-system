name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format Check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files need gofmt:"
            gofmt -l .
            exit 1
          fi

      - name: Run Tests
        run: go test ./...
