version: '3.8'

services:
  notification-system:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NOTIFICATION_ENV=production
    volumes:
      - ./config.production.json:/app/config.json
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

